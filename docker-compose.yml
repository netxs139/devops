# DDAP（DevOps 平台）应用容器
# 依赖共享基础设施（Traefik + PostgreSQL + RabbitMQ）：
#   docker compose -f ../amdp/docker-compose.infra.yml up -d
#   docker compose --profile core up -d

services:
  # 1. 后端 API 服务 (FastAPI + Test Hub)
  api:
    build:
      context: .
      args:
        - PIP_INDEX_URL=http://192.168.5.64:8081/repository/group-pypi/simple
        - PIP_TRUSTED_HOST=192.168.5.64
    image: devops-platform:latest
    container_name: devops-api
    profiles: [ "core" ]
    volumes:
      - .:/app
      - ./persistence_data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "8000" ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s
    command: uv run uvicorn devops_portal.main:app --host 0.0.0.0 --port 8000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ddap-api.rule=Host(`ddap.tjhq.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.ddap-api.entrypoints=websecure"
      - "traefik.http.routers.ddap-api.tls=true"
      - "traefik.http.routers.ddap-api.priority=100"
      - "traefik.http.services.ddap-api.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.ddap-api-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.routers.ddap-api.middlewares=ddap-api-stripprefix"
    networks:
      - infra-net
      - traefik-public

  # 2. 数据异步采集 Worker (多实例竞争消费)
  worker:
    image: devops-platform:latest
    profiles: [ "core" ]
    volumes:
      - .:/app
      - ./persistence_data:/app/data
    entrypoint: [ "uv", "run", "python", "-m", "devops_collector.worker" ]
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      replicas: 2
    networks:
      - infra-net

  # 3. 任务调度器
  scheduler:
    image: devops-platform:latest
    container_name: devops-scheduler
    profiles: [ "core" ]
    volumes:
      - .:/app
      - ./persistence_data:/app/data
    entrypoint: [ "uv", "run", "python", "-m", "devops_collector.scheduler" ]
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - infra-net

  # 4. Decision Hub (Streamlit Dashboard)
  dashboard:
    image: devops-platform:latest
    container_name: devops-dashboard
    profiles: [ "core" ]
    volumes:
      - .:/app
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "8501" ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s
    command: uv run streamlit run dashboard/Home.py
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ddap-dashboard.rule=Host(`ddap.tjhq.com`)"
      - "traefik.http.routers.ddap-dashboard.entrypoints=websecure"
      - "traefik.http.routers.ddap-dashboard.tls=true"
      - "traefik.http.routers.ddap-dashboard.priority=50"
      - "traefik.http.services.ddap-dashboard.loadbalancer.server.port=8501"
    networks:
      - infra-net
      - traefik-public

networks:
  infra-net:
    external: true
  traefik-public:
    external: true
