# GitLab CI/CD 配置文件
# DevOps Platform 自动化全门禁流水线 (Full Gate)
# 此配置确保云端流水线与本地 `make full-gate` 完全对齐，消除环境脱节。

stages:
  - full-gate
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

# ==================== 核心卡点：全门禁 ====================
project-full-gate:
  stage: full-gate
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    # 安装运行时所需的基础工具
    - apk add --no-cache docker-cli-compose make python3
    # 模拟本地环境配置
    - echo "Copying .env file for CI..."
    - cp .env.example .env
    # 启动全量容器栈 (API, DB, MQ等) 以供集成测试使用
    - echo "Starting container stack..."
    - make up
  script:
    - echo "Executing Full Gate script (Security -> Verify -> Build -> dbt)..."
    - python3 scripts/gatekeeper.py --mode full
  after_script:
    # 确保无论测试成败，都清理容器释放资源
    - make down
  coverage: '/(?i)TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ==================== 部署 (仅合并后/打Tag后执行) ====================
deploy-staging:
  stage: deploy
  script:
    - echo "TODO: 添加自动部署到 Staging 环境的脚本"
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual

deploy-production:
  stage: deploy
  script:
    - echo "TODO: 添加自动部署到 Production 环境的脚本"
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_TAG
  when: manual
