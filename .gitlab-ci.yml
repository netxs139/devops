# ======================================================================
# DevOps Platform GitLab CI/CD Pipeline
# Phase 3: Full Gate (Lint + Security + SBOM + Test + Build)
# ======================================================================

# 1. stages - 定义流水线阶段
stages:
  - lint
  - security
  - sbom
  - test
  - build

# 2. variables - 全局变量
variables:
  TZ: Asia/Shanghai
  LOGGING__LEVEL: ERROR
  PIP_INDEX_URL: "http://192.168.5.64:8081/repository/group-pypi/simple"
  PIP_TRUSTED_HOST: "192.168.5.64"
  PIP_EXTRA_INDEX_URL: "https://pypi.org/simple"
  NPM_CONFIG_REGISTRY: "http://192.168.5.64:8081/repository/group-npm/"
  NPM_CONFIG_PREFIX: "/cache/npm"
  NEXUS_DOCKER_REGISTRY: "192.168.5.64:8082"
  UV_CACHE_DIR: ".cache/uv"
  PYTEST_ADDOPTS: "--tb=short"
  DOCKER_DRIVER: overlay2

# 3. default - 全局默认配置（所有 job 继承）
default:
  tags:
    - linux
    - docker

# 4. cache - 全局缓存配置
# 全局持久化缓存：基于分支隔离，加速 pip, uv 和 node_modules
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip
    - .cache/uv
    - node_modules/
  policy: pull-push  # 可选：pull, push, pull-push

# 5. include - 导入其他配置文件（可选）
# include:
#   - local: /.gitlab-ci-templates.yml

# 6. workflow - 工作流规则（可选）
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"       # 仅main分支的push触发
    - if: $CI_MERGE_REQUEST_ID             # MR 也触发
    - if: $CI_COMMIT_TAG                   # Tag 也触发
    - when: never                       # 其他情况不运行

# 7. 自定义 YAML Anchors（可选）
# .default-before-script: &default-before-script
#   before_script:
#     - pip install --cache-dir .cache/pip --trusted-host 192.168.5.64 --index-url $PIP_INDEX_URL uv
#     - uv sync --all-groups

# 7-1. 定义不同的 before_script 模板
.uv-setup-dev: &uv-setup-dev
  before_script:
    - pip install --cache-dir .cache/pip --trusted-host $PIP_TRUSTED_HOST --index-url $PIP_INDEX_URL --extra-index-url https://pypi.org/simple --timeout 120 uv
    - uv sync --extra dev   # ← 改用 --extra
  image: python:3.12-slim  # 也可以设置默认镜像

# 7-2. 定义不同的 before_script 模板
.uv-setup-all: &uv-setup-all
  before_script:
    - pip install --cache-dir .cache/pip --trusted-host $PIP_TRUSTED_HOST --index-url $PIP_INDEX_URL --extra-index-url https://pypi.org/simple --timeout 120 uv
    - uv sync --all-extras   # ← 改用 --all-extras
  image: python:3.12-slim  # 也可以设置默认镜像

# 8. Job 定义

# ──────────────────────────────────────
# Stage: Lint
# ──────────────────────────────────────

ruff-lint:
  stage: lint
  <<: *uv-setup-dev
  script:
    - uv run ruff check devops_collector/ devops_portal/ tests/ scripts/
  allow_failure: false

oxlint:
  stage: lint
  image: node:20-bullseye
  before_script: []
  script:
    - npm ci
    - npx oxlint devops_portal/static/js --ignore-pattern "**/vendor/**"
  allow_failure: false

radon-complexity:
  stage: lint
  <<: *uv-setup-dev
  script:
    - uv run radon cc -a -j devops_collector/ devops_portal/ > radon-complexity.json
    - uv run radon mi -j devops_collector/ devops_portal/ > radon-maintainability.json
  artifacts:
    paths:
      - radon-complexity.json
      - radon-maintainability.json
    expire_in: 60 days
    when: always
  allow_failure: true

type-check-mypy:
  stage: lint
  <<: *uv-setup-dev
  script:
    - uv run mypy devops_collector devops_portal
  allow_failure: false

# ──────────────────────────────────────
# Stage: Security
# ──────────────────────────────────────

sast-scan:
  stage: security
  <<: *uv-setup-dev
  script:
    - uv run bandit -r devops_collector/ devops_portal/ -f json -o bandit-report.json || true
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 60 days
    when: always
  allow_failure: true

secret-detection:
  stage: security
  image: zricethezav/gitleaks:latest
  before_script: []
  script:
    - gitleaks detect --source . --report-format json --report-path gitleaks-report.json --exit-code 0
  artifacts:
    paths:
      - gitleaks-report.json
    expire_in: 60 days
    when: always
  allow_failure: false

trivy-fs-scan:
  stage: security
  image: $NEXUS_DOCKER_REGISTRY/aquasec/trivy:latest
  before_script: []
  script:
    - trivy fs --severity CRITICAL,HIGH --format json --output trivy-fs-report.json .
  artifacts:
    paths:
      - trivy-fs-report.json
    expire_in: 60 days
    when: always
  allow_failure: true

trivy-config-scan:
  stage: security
  image: $NEXUS_DOCKER_REGISTRY/aquasec/trivy:latest
  before_script: []
  script:
    - trivy config --format json --output trivy-config-report.json .
  artifacts:
    paths:
      - trivy-config-report.json
    expire_in: 60 days
    when: always
  allow_failure: true

# ──────────────────────────────────────
# Stage: SBOM (Software Bill of Materials)
# ──────────────────────────────────────

sbom-python:
  stage: sbom
  <<: *uv-setup-dev
  script:
    - uv run cyclonedx-py environment --pyproject pyproject.toml -o sbom-python.json
  artifacts:
    paths:
      - sbom-python.json
    expire_in: 60 days
    when: always

sbom-node:
  stage: sbom
  image: node:20-bullseye
  before_script: []
  script:
    - npm install -g @cyclonedx/cyclonedx-npm
    - cyclonedx-npm -o sbom-node.json
  artifacts:
    paths:
      - sbom-node.json
    expire_in: 60 days
    when: always

# ──────────────────────────────────────
# Stage: Test
# ──────────────────────────────────────

test-unit:
  stage: test
  <<: *uv-setup-all
  script:
    - uv run pytest tests/unit/ -v --cov=devops_collector --cov=devops_portal --cov-report=xml:coverage.xml --junitxml=junit-unit.xml
  artifacts:
    reports:
      junit: junit-unit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 60 days
    when: always

test-integration:
  stage: test
  <<: *uv-setup-all
  services:
    - postgres:15
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres  # pragma: allowlist secret
    POSTGRES_DB: test_ddap
    DB_HOST: postgres
    DATABASE__URI: "postgresql://postgres:postgres@postgres:5432/test_ddap"  # pragma: allowlist secret
  script:
    # -n 1 防御物理死锁
    - uv run pytest tests/integration/ -v -n 1 --junitxml=junit-integration.xml
  artifacts:
    reports:
      junit: junit-integration.xml
    expire_in: 60 days
    when: always

test-e2e:
  stage: test
  <<: *uv-setup-all
  script:
    - uv run pytest tests/e2e/test_dashboard_apptest.py -v --junitxml=junit-e2e.xml
  artifacts:
    reports:
      junit: junit-e2e.xml
    expire_in: 60 days
    when: always

# ──────────────────────────────────────
# Stage: Build & Deploy
# ──────────────────────────────────────

build-docker:
  stage: build
  image: docker:24.0.5
  before_script: []
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_BUILDKIT: "1"
  script:
    - echo "Building Docker image for production/staging..."
    - docker build --build-arg PIP_INDEX_URL=$PIP_INDEX_URL -t devops-platform:${CI_COMMIT_SHA} .
    - echo "Running Trivy Image Scan on built container..."
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock $NEXUS_DOCKER_REGISTRY/aquasec/trivy image --severity CRITICAL,HIGH --format json devops-platform:${CI_COMMIT_SHA} > trivy-image-report.json
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        echo "TODO: Push to internal registry (e.g. docker push devops-platform:${CI_COMMIT_SHA})"
      fi
  artifacts:
    paths:
      - trivy-image-report.json
    expire_in: 60 days
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
