# ======================================================================
# DevOps Platform GitLab CI/CD Pipeline
# Phase 3: Full Gate (Lint + Security + SBOM + Test + Build)
# ======================================================================

stages:
  - lint
  - security
  - sbom
  - test
  - build

variables:
  TZ: Asia/Shanghai
  LOGGING__LEVEL: ERROR
  PIP_INDEX_URL: "http://192.168.5.64:8081/repository/group-pypi/simple"
  NPM_CONFIG_REGISTRY: "http://192.168.5.64:8081/repository/group-npm/"
  NEXUS_DOCKER_REGISTRY: "192.168.5.64:8082"
  UV_CACHE_DIR: ".cache/uv"
  PYTEST_ADDOPTS: "--tb=short"
  DOCKER_DRIVER: overlay2

# 全局持久化缓存：基于分支隔离，加速 pip, uv 和 node_modules
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip
    - .cache/uv
    - node_modules/

# ──────────────────────────────────────
# Stage: Lint
# ──────────────────────────────────────

ruff-lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install --cache-dir .cache/pip --index-url $PIP_INDEX_URL uv
  script:
    - uv run ruff check devops_collector/ devops_portal/ tests/ scripts/
  allow_failure: false

oxlint:
  stage: lint
  image: node:20-bullseye
  before_script:
    - npm ci || npm install
  script:
    - npx oxlint devops_portal/static/js --ignore-pattern "**/vendor/**"
  allow_failure: false

radon-complexity:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install --cache-dir .cache/pip --index-url $PIP_INDEX_URL uv
    - uv pip install --system --index-url $PIP_INDEX_URL radon
  script:
    - uv run radon cc -a -j devops_collector/ devops_portal/ > radon-complexity.json
    - uv run radon mi -j devops_collector/ devops_portal/ > radon-maintainability.json
  artifacts:
    paths:
      - radon-complexity.json
      - radon-maintainability.json
    expire_in: 60 days
    when: always
  allow_failure: true

type-check-mypy:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install --cache-dir .cache/pip --index-url $PIP_INDEX_URL uv
    - uv sync --only-group dev --index-url $PIP_INDEX_URL
  script:
    - uv run mypy devops_collector devops_portal
  allow_failure: false

# ──────────────────────────────────────
# Stage: Security
# ──────────────────────────────────────

sast-scan:
  stage: security
  image: python:3.12-slim
  script:
    - pip install --cache-dir .cache/pip --index-url $PIP_INDEX_URL bandit
    - bandit -r devops_collector/ devops_portal/ -f json -o bandit-report.json || true
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 60 days
    when: always
  allow_failure: true

secret-detection:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --report-format json --report-path gitleaks-report.json --exit-code 0
  artifacts:
    paths:
      - gitleaks-report.json
    expire_in: 60 days
    when: always
  allow_failure: false

trivy-fs-scan:
  stage: security
  image: $NEXUS_DOCKER_REGISTRY/aquasec/trivy:latest
  script:
    - trivy fs --severity CRITICAL,HIGH --format json --output trivy-fs-report.json .
  artifacts:
    paths:
      - trivy-fs-report.json
    expire_in: 60 days
    when: always
  allow_failure: true

trivy-config-scan:
  stage: security
  image: $NEXUS_DOCKER_REGISTRY/aquasec/trivy:latest
  script:
    - trivy config --format json --output trivy-config-report.json .
  artifacts:
    paths:
      - trivy-config-report.json
    expire_in: 60 days
    when: always
  allow_failure: true

# ──────────────────────────────────────
# Stage: SBOM (Software Bill of Materials)
# ──────────────────────────────────────

sbom-python:
  stage: sbom
  image: python:3.12-slim
  script:
    - pip install --cache-dir .cache/pip --index-url $PIP_INDEX_URL cyclonedx-bom
    - cyclonedx-py requirements -i requirements.txt -o sbom-python.json
  artifacts:
    paths:
      - sbom-python.json
    expire_in: 60 days
    when: always

sbom-node:
  stage: sbom
  image: node:20-bullseye
  script:
    - npm install -g @cyclonedx/cyclonedx-npm
    - cyclonedx-npm -o sbom-node.json
  artifacts:
    paths:
      - sbom-node.json
    expire_in: 60 days
    when: always

# ──────────────────────────────────────
# Stage: Test
# ──────────────────────────────────────

test-unit:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --cache-dir .cache/pip --index-url $PIP_INDEX_URL uv
    - uv sync --all-groups --index-url $PIP_INDEX_URL
  script:
    - uv run pytest tests/unit/ -v --cov=devops_collector --cov=devops_portal --cov-report=xml:coverage.xml --junitxml=junit-unit.xml
  artifacts:
    reports:
      junit: junit-unit.xml
      cobertura: coverage.xml
    expire_in: 60 days
    when: always

test-integration:
  stage: test
  image: python:3.12-slim
  services:
    - postgres:15
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres  # pragma: allowlist secret
    POSTGRES_DB: test_ddap
    DB_HOST: postgres
    DATABASE__URI: "postgresql://postgres:postgres@postgres:5432/test_ddap"  # pragma: allowlist secret
  before_script:
    - pip install --cache-dir .cache/pip --index-url $PIP_INDEX_URL uv
    - uv sync --all-groups --index-url $PIP_INDEX_URL
  script:
    # -n 1 防御物理死锁
    - uv run pytest tests/integration/ -v -n 1 --junitxml=junit-integration.xml
  artifacts:
    reports:
      junit: junit-integration.xml
    expire_in: 60 days
    when: always

test-e2e:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --cache-dir .cache/pip --index-url $PIP_INDEX_URL uv
    - uv sync --all-groups --index-url $PIP_INDEX_URL
  script:
    - uv run pytest tests/e2e/test_dashboard_apptest.py -v --junitxml=junit-e2e.xml
  artifacts:
    reports:
      junit: junit-e2e.xml
    expire_in: 60 days
    when: always

# ──────────────────────────────────────
# Stage: Build & Deploy
# ──────────────────────────────────────

build-docker:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_BUILDKIT: "1"
  script:
    - echo "Building Docker image for production/staging..."
    - docker build --build-arg PIP_INDEX_URL=$PIP_INDEX_URL -t devops-platform:${CI_COMMIT_SHA} .
    - echo "Running Trivy Image Scan on built container..."
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock $NEXUS_DOCKER_REGISTRY/aquasec/trivy image --severity CRITICAL,HIGH --format json devops-platform:${CI_COMMIT_SHA} > trivy-image-report.json
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        echo "TODO: Push to internal registry (e.g. docker push devops-platform:${CI_COMMIT_SHA})"
      fi
  artifacts:
    paths:
      - trivy-image-report.json
    expire_in: 60 days
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
