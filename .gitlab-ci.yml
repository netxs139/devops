# GitLab CI/CD 配置文件
# DevOps Platform 自动化全门禁流水线 (Full Gate)
# 此配置确保云端流水线与本地 `make full-gate` 完全对齐，消除环境脱节。

stages:
  - full-gate
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

# ==================== 核心卡点：全门禁 ====================
project-full-gate:
  stage: full-gate
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DEVOPS_SKIP_AUDIT: "true"
    DOCKER_BUILDKIT: "1"
    COMPOSE_DOCKER_CLI_BUILD: "1"
  before_script:
    # 安装运行时所需的基础工具 (包括 curl, bash 供 uv 安装使用)
    - apk add --no-cache docker-cli-compose make python3 curl bash
    # 安装 uv
    - curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="/usr/local/bin" sh
    # 准备环境
    - echo "Copying .env file for CI..."
    - cp .env.example .env
    - mkdir -p reports/security
    # 安装本地宿主机工具 (用于 lint, detect-secrets 等)
    - uv sync --all-groups
  script:
    - echo "Building Docker Images..."
    - make build
    - echo "Starting container stack..."
    - make up
    - echo "Executing Full Gate script (Security -> Verify -> Build -> dbt)..."
    - uv run python scripts/gatekeeper.py --mode full
  after_script:
    # 确保无论测试成败，都清理容器释放资源
    - make down
  coverage: '/(?i)TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ==================== 部署 (仅合并后/打Tag后执行) ====================
deploy-staging:
  stage: deploy
  script:
    - echo "TODO: 添加自动部署到 Staging 环境的脚本"
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual

deploy-production:
  stage: deploy
  script:
    - echo "TODO: 添加自动部署到 Production 环境的脚本"
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_TAG
  when: manual
