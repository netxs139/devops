# Pre-commit configuration for DevOps Platform (Full Local & Lightning Fast)
# All tools are managed by 'uv' and executed locally to avoid network dependencies.

repos:
  - repo: local
    hooks:
      # 环境自动补齐 (Self-Healing Environment)
      - id: env-autopilot
        name: Environment Autopilot (Sync Extras)
        entry: uv sync --all-groups --all-extras --frozen
        language: system
        pass_filenames: false
        files: '^(pyproject\.toml|uv\.lock)$'

      # 代码格式化与 Linting (Ruff)
      - id: ruff
        name: Ruff Lint
        entry: uv run ruff check --fix
        language: system
        types: [python]
        exclude: '^(\.agent/|scripts/archived/)'

      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format
        language: system
        types: [python]

      # JS 静态检查 (Oxlint)
      - id: oxlint
        name: Oxlint JS Lint
        entry: ./node_modules/.bin/oxlint --ignore-pattern "**/vendor/**"
        language: system
        files: 'devops_portal/static/js/.*\.js$'
        pass_filenames: true

      # 敏感信息扫描 (Left-shifted to Host)
      - id: detect-secrets
        name: Detect Secrets
        entry: uv run detect-secrets-hook --baseline .secrets.baseline
        language: system
        types: [text]
        exclude: '.*\.lock|tests/.*'


      # 数据字典新鲜度检查
      - id: check-data-dict
        name: Check Data Dictionary Freshness
        entry: uv run python devops_collector/management/commands/check_data_dict_freshness.py
        language: python
        files: 'devops_collector/models/.*\.py$|devops_collector/plugins/.*/models\.py$'
        pass_filenames: false

      # 禁止提交包含表情符号的文件
      - id: check-no-emoji
        name: Check No Emoji in Code
        entry: uv run python -c "import sys; sys.exit(1 if any(ord(c) > 127 and ord(c) in range(0x1F600, 0x1F64F) for c in open(sys.argv[1], encoding='utf-8').read()) else 0)"
        language: python
        types: [python, markdown, html, css, javascript]
        exclude: '^(tests/|archived/)'

      # 标准防呆检查 (pre-commit-hooks managed by uv)
      - id: trailing-whitespace
        name: Trailing Whitespace
        entry: uv run trailing-whitespace-fixer
        language: system
        types: [text]

      - id: end-of-file-fixer
        name: End of File Fixer
        entry: uv run end-of-file-fixer
        language: system
        types: [text]

      - id: check-yaml
        name: Check YAML
        entry: uv run check-yaml
        language: system
        types: [yaml]

      - id: check-toml
        name: Check TOML
        entry: uv run check-toml
        language: system
        types: [toml]

      - id: check-merge-conflict
        name: Check Merge Conflict
        entry: uv run check-merge-conflict
        language: system
        types: [text]

      # 静态类型检查
      - id: mypy
        name: Mypy Static Type Checking
        entry: uv run mypy
        language: system
        types: [python]
        require_serial: true
        exclude: 'devops_collector/core/schemas\.py'

      # Commit Message 规范拦截
      - id: commitizen
        name: Check Commit Message (Conventional Commits)
        entry: uv run cz check --commit-msg-file
        language: system
        stages: [commit-msg]


      # HTML/Jinja2 缩进规范 (djHTML)
      - id: djhtml
        name: djHTML Formatter
        entry: uv run djhtml --tabwidth 2
        language: system
        files: '\.(html|j2)$'
        pass_filenames: true

      # Markdown 文档对齐 (mdformat)
      - id: mdformat
        name: Markdown Formatter
        entry: uv run mdformat
        language: system
        types: [markdown]
        pass_filenames: true
        exclude: '^(docs/history/|progress\.txt)'
