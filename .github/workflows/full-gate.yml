name: DevOps Platform Full Gate
# 此工作流确保云端 GitHub Actions 与本地 `make full-gate` 完全对齐，消除环境脱节。

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  full-gate:
    name: "Full Gate (Security -> Verify -> Build -> dbt)"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-path: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Prepare Environment
        run: |
          echo "Copying .env file for CI..."
          cp .env.example .env
          # 注入 CI 专用环境变量 (跳过 RabbitMQ 审计以加速单元测试)
          echo "DEVOPS_SKIP_AUDIT=true" >> $GITHUB_ENV

      - name: Install Local Tools
        run: uv sync --all-groups

      - name: Launch Full Gate Check
        run: |
          # 启动容器栈 (数据库、消息队列等，供集成测试使用)
          make up
          # 执行全门禁脚本
          python scripts/gatekeeper.py --mode full

      - name: Cleanup Containers
        if: always()
        run: make down
